apiVersion: apps/v1
kind: Deployment
metadata:
  name: harness-lab-app
  labels:
    app: harness-lab-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: harness-lab-app
  template:
    metadata:
      labels:
        app: harness-lab-app
    spec:
      containers:
        - name: harness-lab-app
          image: {{ .Values.image }}
          ports:
            - containerPort: 5000
          env:
            - name: APP_VERSION
              value: "v1"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 20
